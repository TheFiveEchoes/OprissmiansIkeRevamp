Localization
{
    en-us
    {
        //General Description
        #LOC_OPIKRE_Ike_dspn = Ike^N
        #LOC_OPIKRE_Ike_celDesc = Ike is a very odd moon, moon things considered. Not only does it have the tendency to fling spacecraft into Duna if you don't plan your trip carefully, but it being in a geosynchronous retrograde orbit around its host planet freaks out anyone trying to figure out how that happened.

        //Biomes
        #LOC_OPIKRE_Ike_Biome_001 = Baron Canyons
        #LOC_OPIKRE_Ike_Biome_002 = Lower Crater Basins
        #LOC_OPIKRE_Ike_Biome_003 = Upper Crater Basins
        #LOC_OPIKRE_Ike_Biome_004 = Lowlands
        #LOC_OPIKRE_Ike_Biome_005 = Duna Ejecta Fields
        #LOC_OPIKRE_Ike_Biome_006 = Midlands
        #LOC_OPIKRE_Ike_Biome_007 = Highlands
        #LOC_OPIKRE_Ike_Biome_008 = Crystal Dust Peak Rims
        #LOC_OPIKRE_Ike_Biome_009 = Crystal Dust Peaks

        //Science Defs
        #LOC_OPIKRE_Ike_crewReport_001 = If you didn't see the mountains and those deep canyons you could mistake this world for the Mun or Dres.
        #LOC_OPIKRE_Ike_crewReport_002 = We've managed to land on Ike! And we like that.
        #LOC_OPIKRE_Ike_crewReport_003 = The large crystals outside remind you of that Kremnoan King from that one videogame.

        #LOC_OPIKRE_Ike_evaReport_001 = Your eyes scan all the surface features of Ike. Those mountains with the red peaks especially make you interested...
        #LOC_OPIKRE_Ike_evaReport_002 = I was walking on Ike one day, in the lovley month of... uh... how did it go again?
        #LOC_OPIKRE_Ike_evaReport_003 = The canyon walls seem quite intimidating from up close. Thankfully there aren't any space worms that would jump at you from the walls... hopefully...
        #LOC_OPIKRE_Ike_evaReport_004 = If Ike had an atmosphere this would be quite a good place to fake a Duna landing...
        #LOC_OPIKRE_Ike_evaReport_005 = The view over all the plains and craters from this place is quite the experience. If only skiing was possible here...
        #LOC_OPIKRE_Ike_evaReport_006 = The red dust gets stuck on your boots. Maybe it could make a nice decor addition in your spaceship?

        #LOC_OPIKRE_Ike_surfaceSample_001 = As you scoop up the regolith you realize that it's not that deep, with a hard rock surface appearing just after a few scoops.
        #LOC_OPIKRE_Ike_surfaceSample_002 = The regolith here has a few chunks of Ike rock and remnants of ancient impactors. Quite a valuable find indeed.
        #LOC_OPIKRE_Ike_surfaceSample_003 = You try your best to get an even mix of Ike and Duna dust into your sample container.
        #LOC_OPIKRE_Ike_surfaceSample_004 = As you sccop up the sample you realize that the Duna dust is more sandy than the Ike dust. You now want to compare its sandy-ness with that of Kerbin sand.
        #LOC_OPIKRE_Ike_surfaceSample_005 = The surface here is comprised of lots of rock, so you get your pickaxe to obtain some samples. A voice in the back of your mind shouts: "Amaze Amaze Amaze!"
        #LOC_OPIKRE_Ike_surfaceSample_006 = Small red crystals get scooped up with the rocks and dust. Maybe you can keep one as a souvenir?
        #LOC_OPIKRE_Ike_surfaceSample_007 = As you scoop up the red dust you wonder if it could be used as sprinkles on a cake. The KSC reminds you that unknown substances shouldn't be used as cake decor.

        #LOC_OPIKRE_Ike_seismicScan_001 = The scanner confirms that the regolith here is indeed thinner than further up.
        #LOC_OPIKRE_Ike_seismicScan_002 = The scanner reads seismic waves from all directions, suggesting that the red dust acts as a sort of reflector.

        #LOC_OPIKRE_Ike_gravityScan_001 = The gravity scan can pick up the effects of Duna from here.
        #LOC_OPIKRE_Ike_gravityScan_002 = Gravity readings are pretty low here given the depth of this area.
        #LOC_OPIKRE_Ike_gravityScan_003 = The readings are a bit jumbled. Could that weird red dust interfere with them?
        #LOC_OPIKRE_Ike_gravityScan_004 = The mountains have a slightly higher gravitational reading than the rest of Ike, suggesting that they're composed of denser materials.

        #LOC_OPIKRE_Ike_atmosphereScan_001 = Appart from some dust giving some anormal readings there is no atmosphere present on this world.

        #LOC_OPIKRE_Ike_barometerScan_001 = The barometer shows a value as zero as it can be in a vacuum.

        #LOC_OPIKRE_Ike_mysteryGoo_001 = The goo rises to the top of the canister and seems to tremble.
        #LOC_OPIKRE_Ike_mysteryGoo_002 = The goo takes on the same red shimmer as the glittering dust outside.

        #LOC_OPIKRE_Ike_materialsLab_001 = Looks like the dust has contamined the samples. This still provides valuable insight though.
        #LOC_OPIKRE_Ike_materialsLab_002 = Some of the kicked-up red dust crystalizes as it comes in contact with the samples. What a visualy pleasing spectacle!
    }
}